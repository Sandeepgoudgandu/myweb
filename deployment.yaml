apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-mongo
  labels:
    app: spring-boot-mongo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-mongo
  template:
    metadata:
      labels:
        app: spring-boot-mongo
    spec:
      containers:
      - name: spring-boot-mongo
        image: sandeepgoudgandu/spring-boot-mongo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
